<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Watch Intel · Luxury Watch Market Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#FAF6F0; --card:#FFFFFF; --ink:#1C1917; --muted:#78716C; --gold:#B08D3E;
  --gold-light:#E5D5B0; --line:#EDE6DA; --green:#3F6212; --red:#9F1239; --mine:#FDF6E9;
  --ink2:#221E1A;
}
*{box-sizing:border-box;margin:0;}
body{background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,sans-serif;font-size:15px;line-height:1.5;}
h1,h2,h3,.serif{font-family:'Playfair Display',Georgia,serif;font-weight:600;}
a{color:inherit;}
header{border-bottom:1px solid var(--line);background:var(--card);padding:16px 20px;position:sticky;top:0;z-index:20;}
.header-inner{max-width:1240px;margin:0 auto;display:flex;flex-wrap:wrap;align-items:center;gap:8px 24px;}
header h1{font-size:22px;letter-spacing:.02em;}
header h1 .accent{color:var(--gold);}
header .tagline{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);}
nav{display:flex;gap:6px;font-size:14px;flex-wrap:wrap;}
nav button{background:none;border:none;font:inherit;color:var(--muted);padding:6px 2px;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;}
nav button.active{color:var(--ink);border-bottom-color:var(--gold);font-weight:600;}
.right{margin-left:auto;display:flex;align-items:center;gap:14px;}
.updated{font-size:12.5px;color:var(--muted);}
.btn{background:var(--ink);color:#fff;border:none;border-radius:9px;padding:8px 15px;font:inherit;font-size:13px;font-weight:600;cursor:pointer;}
.btn.gold{background:var(--gold);}
.btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);font-weight:600;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{display:inline-block;animation:spin .8s linear infinite;}
main{max-width:1240px;margin:0 auto;padding:24px 20px 64px;}
section{margin-bottom:34px;}
h2{font-size:25px;margin-bottom:3px;}
h3{font-size:17px;margin:20px 0 10px;}
.sub{color:var(--muted);font-size:13px;margin-bottom:14px;max-width:820px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 17px;}
.card .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.card .value{font-size:25px;font-family:'Playfair Display',serif;margin-top:4px;line-height:1.1;}
.card .delta{font-size:12px;color:var(--muted);margin-top:3px;}
.card .chg{font-size:11.5px;font-weight:600;margin-top:5px;}
.up{color:var(--green);} .down{color:var(--red);} .flat{color:var(--muted);}
.table-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--line);border-radius:12px;}
table{border-collapse:collapse;width:100%;min-width:640px;font-size:13.5px;}
th,td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap;}
th:first-child,td:first-child{text-align:left;}
th{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;background:#FCFAF6;position:sticky;top:0;z-index:1;}
tbody tr:last-child td{border-bottom:none;}
tr.mine{background:var(--mine);}
td.title-cell{max-width:330px;}
td.title-cell>div,td.title-cell a{display:inline-block;max-width:330px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:bottom;}
.num{text-align:right;font-variant-numeric:tabular-nums;}
.muted{color:var(--muted);}
.neg{color:var(--red);} .pos{color:var(--green);}
.badge{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:99px;background:var(--gold-light);color:#6b5318;letter-spacing:.03em;white-space:nowrap;}
.badge.sold{background:#FCE7EB;color:var(--red);} .badge.bought{background:#DCEAD0;color:var(--green);}
.badge.offer{background:#E0E7FF;color:#3730A3;} .badge.hot{background:#FBE5E8;color:var(--red);}
.badge.auto{background:#F1EADD;color:#9a7b2e;} .badge.aged{background:#FEF3C7;color:#92400E;}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.chart-box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;}
.chart-box h3{margin:0 0 10px;font-size:15px;}
.bars .row{display:flex;align-items:center;gap:11px;padding:5px 0;}
.bars .k{width:140px;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bars .track{flex:1;height:9px;background:#F1EADD;border-radius:99px;overflow:hidden;}
.bars .fill{height:100%;border-radius:99px;}
.bars .v{width:70px;text-align:right;font-size:12.5px;font-variant-numeric:tabular-nums;}
.bars .n{width:34px;text-align:right;font-size:11.5px;color:var(--muted);}
.cmp th:first-child,.cmp td:first-child{font-weight:600;}
.cmp th{text-align:right;} .cmp th.col{color:var(--ink);}
.col-gentry{color:var(--gold);} .col-onetime{color:var(--ink);}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.pill{text-decoration:none;padding:7px 15px;border-radius:99px;font-size:13px;border:1px solid var(--line);background:var(--card);color:var(--muted);cursor:pointer;}
.pill.active{border-color:var(--gold);color:var(--ink);background:var(--mine);font-weight:600;}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:14px;}
input,select{font:inherit;}
.inp{border:1px solid #E2DACB;border-radius:8px;padding:8px 11px;background:#fff;font-size:13px;}
.thumb{width:38px;height:38px;border-radius:7px;object-fit:cover;background:#F1EADD;border:1px solid var(--line);}
.pcode{display:inline-block;min-width:26px;text-align:center;font-size:11px;font-weight:600;padding:2px 7px;border-radius:99px;color:#fff;}
.insight-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px;}
.insight{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
.insight .tag{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--gold);}
.insight p{margin:.4rem 0 0;font-size:14px;line-height:1.45;}
.dark{background:var(--ink2);border:1px solid #4A3B22;border-radius:14px;padding:20px 22px;color:#EDE7DC;}
.dark .label{color:#C9A75A;}
.dark .dstat{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:14px;margin:6px 0 16px;}
.dark .dstat .v{font-family:'Playfair Display',serif;font-size:24px;color:#fff;margin-top:2px;}
.dark .dstat .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:#9C938A;}
.dark .tier{background:#2A2420;border:1px solid #4A3B22;border-radius:10px;padding:12px 14px;}
.dark table{min-width:0;}
.dark th,.dark td{border-bottom-color:#322D29;color:#E7E1D8;}
.dark th{background:transparent;color:#9C938A;}
.note{background:#FBF3E6;border:1px solid #ECDCB8;color:#6b5318;border-radius:10px;padding:10px 14px;font-size:12.5px;margin-bottom:16px;}
.footnote{font-size:12px;color:var(--muted);margin-top:24px;}
.empty{padding:30px;text-align:center;color:#A8A29E;font-size:13px;}
.loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:80px 0;color:var(--muted);}
.spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@media (max-width:760px){
  .chart-grid{grid-template-columns:1fr;}
  header h1{font-size:18px;}
  .card .value{font-size:21px;}
  main{padding:16px 12px 56px;}
  .right{width:100%;}
}
</style>
</head>
<body>
<header><div class="header-inner">
  <h1>Watch<span class="accent">Intel</span></h1>
  <span class="tagline">Luxury Watch Market Intelligence</span>
  <nav id="nav"></nav>
  <div class="right">
    <span class="updated" id="updated">Loading…</span>
    <button class="btn ghost" id="refreshBtn">↻ Refresh</button>
  </div>
</div></header>
<main><div id="view"></div></main>

<script type="module">
import { fetchAll, getHistory } from './watch-data.js';

/* ─────────────── state ─────────────── */
const TABS = [
  ['cockpit','Executive Cockpit'],
  ['dealers','Dealer Comparison'],
  ['movements','Market Movements'],
  ['brands','Brand Intelligence'],
  ['dealcheck','Reference / Deal Check'],
  ['inventory','Inventory Explorer'],
  ['reports','Reports / Archive'],
];
const STATE = {
  tab: 'cockpit', data: null, archive: [], refreshing: true, error: null,
  lookup: '', salesYear: null,
  inv: { q:'', source:'all', brand:'all', partner:'all', incl:'all', minP:'', maxP:'', year:'', sort:'value' },
  archiveQ: '', showForm: false,
  form: blankForm(),
};
let charts = [];

/* ─────────────── helpers ─────────────── */
function peso(n){ if(n==null||isNaN(n)) return '—'; return '₱'+(n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':Math.round(n)); }
function full(n){ return (n==null||isNaN(n))?'—':'₱'+Math.round(n).toLocaleString(); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function normRef(s){ return (s||'').toUpperCase().replace(/[^0-9A-Z]/g,''); }
function partnerColor(code){ const m={'1':'#B08D3E','2':'#1D4ED8','3':'#9F1239','4':'#3F6212','5':'#7C3AED','6':'#0E7490'}; return m[code]||'#A8A29E'; }
function partnerLabel(code){ return (!code||code==='Unassigned')?'Unassigned':'Partner '+code; }
function blankForm(){ const d=new Date(Date.now()+8*3600*1000).toISOString().slice(0,10); return {kind:'Bought',brand:'',model:'',ref:'',year:'',cond:'',price:'',cost:'',incl:'',date:d,source:'',notes:''}; }
function todayStr(){ return new Date(Date.now()+8*3600*1000).toISOString().slice(0,10); }
function nowParts(){ const n=new Date(Date.now()+8*3600*1000); return {y:n.getUTCFullYear(),m:n.getUTCMonth()+1}; }
function parseD(d){ const t=Date.parse((d||'')+'T00:00:00+08:00'); return isNaN(t)?null:t; }
function ym(d){ const m=/^(\d{4})-(\d{2})/.exec(d||''); return m?{y:+m[1],mo:+m[2]}:null; }
const el = id => document.getElementById(id);

function liveItems(){ const d=STATE.data; return d ? [...(d.gentry||[]), ...(d.onetime||[])] : []; }
function soldRecords(){ return STATE.archive.filter(r=>r.kind==='Sold'); }
function soldWindow(days){ const t=Date.now(); return soldRecords().filter(r=>{ const p=parseD(r.date); return p!=null && (t-p)<=days*86400000; }); }
function sumP(arr){ return arr.reduce((a,r)=>a+(r.price||0),0); }
function sLbl(n){ return n+(n===1?' sale':' sales'); }
function sourceOfSale(r){ const s=r.source||''; if(/^gentry/i.test(s)) return 'Gentry'; if(/1\s*time|1tp/i.test(s)) return '1TimePiece'; return 'Other'; }

const EXPOSURE = ['Rolex','Audemars Piguet','Patek Philippe','Cartier','Tudor','Omega'];
const HOT = [
  ['Rolex steel sports', w=>/rolex/i.test(w.brand) && /submariner|gmt|daytona|explorer|sea-?dweller|yacht-?master/i.test(w.name)],
  ['Daytona', w=>/daytona/i.test(w.name)],
  ['GMT-Master II', w=>/gmt-?master|gmt/i.test(w.name) && /rolex/i.test(w.brand)],
  ['Submariner', w=>/submariner/i.test(w.name)],
  ['Datejust', w=>/datejust/i.test(w.name)],
  ['Cartier Santos', w=>/cartier/i.test(w.brand) && /santos/i.test(w.name)],
  ['AP Royal Oak / Offshore', w=>/audemars|\bAP\b/i.test(w.brand) && /royal\s*oak|offshore/i.test(w.name)],
  ['Patek Nautilus / Aquanaut', w=>/nautilus|aquanaut/i.test(w.name)],
  ['Richard Mille', w=>/richard\s*mille/i.test(w.brand) || /\bRM\s?\d/i.test(w.name)],
];

/* ─────────────── archive persistence (schema preserved) ─────────────── */
async function loadArchive(){
  let arch=[];
  try{ const r=await fetch('./price-archive.json'); if(r.ok) arch=await r.json(); }catch(e){}
  try{ const ls=JSON.parse(localStorage.getItem('wi_archive_v1')); if(Array.isArray(ls)) arch=ls; }catch(e){}
  return Array.isArray(arch)?arch:[];
}
function persistArchive(a){ try{ localStorage.setItem('wi_archive_v1', JSON.stringify(a)); }catch(e){} }
function mergeAutoSold(list){
  const seen=new Set(STATE.archive.filter(r=>r.srcKey).map(r=>r.srcKey));
  const add=list.filter(r=>r.srcKey && !seen.has(r.srcKey));
  if(!add.length) return;
  STATE.archive=[...add, ...STATE.archive];
  persistArchive(STATE.archive);
}

/* ─────────────── data load / refresh ─────────────── */
async function refresh(force){
  STATE.refreshing=true; renderHeader();
  try{
    const d=await fetchAll(force);
    if(d.autoSold && d.autoSold.length) mergeAutoSold(d.autoSold);
    STATE.data=d; STATE.error=null;
  }catch(e){ STATE.error=String(e&&e.message||e); }
  STATE.refreshing=false; render();
}

/* ─────────────── deal-check comps (logic preserved + extended) ─────────────── */
function comps(query){
  const q=(query||'').trim().toLowerCase(); if(!q) return [];
  const nq=normRef(query);
  const match=(name,ref)=>{ const hay=(name||'').toLowerCase(); if(hay.includes(q)) return true; if(nq.length>=3 && normRef(ref).includes(nq)) return true; return false; };
  const out=[]; const d=STATE.data;
  if(d){
    (d.gentry||[]).forEach(w=>{ if(w.price && match(w.name,w.ref)) out.push({name:w.name,tag:'Gentry',src:'Gentry',date:'live',price:w.price}); });
    (d.onetime||[]).forEach(w=>{ if(w.price && match(w.name,w.ref)) out.push({name:w.name,tag:'1TP'+(w.partner?' P'+w.partner:''),src:'1TimePiece',date:'live',price:w.price}); });
  }
  STATE.archive.forEach(r=>{ if(r.price && match((r.model||'')+' '+(r.brand||''),r.ref)) out.push({name:((r.brand||'')+' '+(r.model||'')).trim(),tag:r.kind,src:'Archive',date:r.date,price:r.price}); });
  return out;
}

/* ─────────────── render dispatch ─────────────── */
function renderHeader(){
  el('nav').innerHTML = TABS.map(([k,label])=>`<button data-tab="${k}" class="${STATE.tab===k?'active':''}">${label}</button>`).join('');
  el('nav').querySelectorAll('button').forEach(b=> b.onclick=()=>{ STATE.tab=b.dataset.tab; render(); window.scrollTo(0,0); });
  el('updated').textContent = STATE.data ? ('Updated '+STATE.data.generatedAt+' PHT · auto-refresh 6h'+(STATE.data.stale?' · cached':'')) : (STATE.error?'Live fetch issue':'Loading…');
  const rb=el('refreshBtn');
  rb.innerHTML = STATE.refreshing ? '<span class="spin">↻</span> Refreshing…' : '↻ Refresh';
  rb.disabled = STATE.refreshing;
  rb.onclick = ()=> refresh(true);
}
function destroyCharts(){ charts.forEach(c=>{ try{c.destroy();}catch(e){} }); charts=[]; }

function render(){
  renderHeader();
  destroyCharts();
  const v=el('view');
  if(STATE.refreshing && !STATE.data){ v.innerHTML='<div class="loading"><div class="spinner"></div><div>Fetching live inventory from Gentry &amp; 1TimePiece…</div></div>'; return; }
  if(STATE.error && !STATE.data){ v.innerHTML=`<div class="empty" style="color:var(--red)">Couldn't load market data: ${esc(STATE.error)}<br><br>Your saved archive is safe. Try Refresh.</div>`; return; }
  ({cockpit:renderCockpit,dealers:renderDealers,movements:renderMovements,brands:renderBrands,dealcheck:renderDealCheck,inventory:renderInventory,reports:renderReports}[STATE.tab]||renderCockpit)();
}

/* ─────────────── line chart helper (Bag-Intel style) ─────────────── */
function lineChart(canvas, datasets, money){
  if(!window.Chart) return;
  const c=new Chart(canvas,{type:'line',data:{datasets},options:{
    responsive:true,maintainAspectRatio:false,interaction:{mode:'nearest',intersect:false},
    scales:{x:{type:'category',grid:{display:false},ticks:{maxTicksLimit:8,font:{size:10}}},
      y:{ticks:{callback:v=>money?peso(v):v,font:{size:10}},grid:{color:'#F0EAE0'}}},
    plugins:{legend:{labels:{boxWidth:10,font:{size:11}}},
      tooltip:{callbacks:{label:cc=>cc.dataset.label+': '+(money?full(cc.parsed.y):cc.parsed.y)}}}
  }});
  charts.push(c);
}
function ds(label,points,color){ return {label,data:points,borderColor:color,backgroundColor:color+'22',pointRadius:1.5,borderWidth:2,tension:.25,fill:false}; }

/* ─────────────── TAB 1 · Executive Cockpit ─────────────── */
function renderCockpit(){
  const d=STATE.data, ag=d.agg;
  const combined=ag.gentry.value+ag.onetime.value;
  const pieces=ag.gentry.count+ag.onetime.count;
  // deltas vs last committed history day before today
  const hist=(getHistory()||[]); const today=todayStr();
  const baseRow=hist.filter(h=>h&&h.d&&h.d<today).slice(-1)[0]||null;
  const chg=(now,was)=>{ if(was==null||!isFinite(was)||!baseRow) return ''; const diff=now-was; if(!diff) return `<div class="chg flat">no change vs ${baseRow.d.slice(5)}</div>`; return `<div class="chg ${diff>0?'up':'down'}">${diff>0?'▲':'▼'} ${peso(Math.abs(diff))} vs ${baseRow.d.slice(5)}</div>`; };
  const w7=soldWindow(7), w30=soldWindow(30);
  const {y:cy,m:cm}=nowParts();
  const wmtd=soldRecords().filter(r=>{const p=ym(r.date);return p&&p.y===cy&&p.mo===cm;});
  const st30=(pieces+w30.length)?Math.round(w30.length/(pieces+w30.length)*100):0;
  // top 5 brands by combined inventory value
  const bmap={}; liveItems().forEach(w=>{ if(!w.price) return; const b=w.brand||'Other'; (bmap[b]=bmap[b]||{v:0,n:0}); bmap[b].v+=w.price; bmap[b].n++; });
  const topBrands=Object.entries(bmap).map(([k,x])=>({k,...x})).sort((a,b)=>b.v-a.v).slice(0,5);
  const tbMax=topBrands.reduce((m,x)=>Math.max(m,x.v),1);
  // high-value alerts ≥ ₱1M
  const hi=liveItems().filter(w=>w.price&&w.price>=1e6).sort((a,b)=>b.price-a.price);
  const hiVal=sumP(hi);
  // latest sales / removed
  const latest=soldRecords().slice().sort((a,b)=>(a.date<b.date?1:-1)).slice(0,8);

  el('view').innerHTML = `
  <section>
    <h2>Executive Cockpit</h2>
    <p class="sub">Owner-level view of the whole book — live inventory across Gentry &amp; 1TimePiece, recent sell-through, and high-value exposure. Peso values from listed prices.</p>
    <div class="cards">
      <div class="card"><div class="label">Combined value</div><div class="value">${peso(combined)}</div><div class="delta">${pieces.toLocaleString()} pieces tracked</div>${chg(combined,baseRow?baseRow.gv+baseRow.ov:null)}</div>
      <div class="card"><div class="label">Gentry</div><div class="value">${peso(ag.gentry.value)}</div><div class="delta">${ag.gentry.count} watches</div>${chg(ag.gentry.value,baseRow?baseRow.gv:null)}</div>
      <div class="card"><div class="label">1TimePiece</div><div class="value">${peso(ag.onetime.value)}</div><div class="delta">${ag.onetime.count} watches · ${ag.onetime.held} on hold</div>${chg(ag.onetime.value,baseRow?baseRow.ov:null)}</div>
      <div class="card"><div class="label">Sold · 7 days</div><div class="value">${peso(sumP(w7))}</div><div class="delta">${sLbl(w7.length)}</div></div>
      <div class="card"><div class="label">Sold · 30 days</div><div class="value">${peso(sumP(w30))}</div><div class="delta">${sLbl(w30.length)}</div></div>
      <div class="card"><div class="label">Sold · MTD</div><div class="value">${peso(sumP(wmtd))}</div><div class="delta">${sLbl(wmtd.length)}</div></div>
      <div class="card"><div class="label">Sell-through · 30d</div><div class="value">${st30}%</div><div class="delta">of listed + sold</div></div>
      <div class="card"><div class="label">Pieces ≥ ₱1M</div><div class="value">${hi.length}</div><div class="delta">${peso(hiVal)} exposure</div></div>
    </div>
  </section>

  <section>
    <h3 style="margin-top:0">Dealers side by side</h3>
    <div class="table-wrap"><table>
      <thead><tr><th>Source</th><th>Items</th><th>Inv. value</th><th>Avg ticket</th><th>Sold MTD</th><th>Sold ₱ MTD</th><th>Brands</th><th>Notes</th></tr></thead>
      <tbody>
        <tr class="mine"><td>Gentry Timepieces</td><td class="num">${ag.gentry.count}</td><td class="num">${full(ag.gentry.value)}</td><td class="num">${peso(ag.gentry.avg)}</td>
          <td class="num">${mtdBySource('Gentry').n}</td><td class="num">${peso(mtdBySource('Gentry').v)}</td><td class="num">${ag.gentry.byBrand.length}</td><td class="muted" style="text-align:right">own retail</td></tr>
        <tr><td>1TimePiece</td><td class="num">${ag.onetime.count}</td><td class="num">${full(ag.onetime.value)}</td><td class="num">${peso(ag.onetime.avg)}</td>

      <div style="display:flex;flex-wrap:wrap;gap:20px">
        ${tiers.map(t=>`<div><span style="font-size:12px;color:#B6ADA0">${t.m}% margin → buy under </span><span style="font-weight:700;color:#fff">${full(t.price)}</span></div>`).join('')}

      <select id="ivpartner" class="inp"><option value="all">All partners</option>${partners.map(p=>`<option value="${esc(p)}">Partner ${esc(p)}</option>`).join('')}</select>
      <select id="ivincl" class="inp"><option value="all">Any inclusions</option><option value="Box">Box</option><option value="Papers">Papers</option><option value="Manuals">Manuals</option></select>
      <input id="ivmin" class="inp" style="width:110px" placeholder="Min ₱" value="${esc(f.minP)}">
      <input id="ivmax" class="inp" style="width:110px" placeholder="Max ₱" value="${esc(f.maxP)}">
      <input id="ivyear" class="inp" style="width:90px" placeholder="Year" value="${esc(f.year)}">
      <select id="ivsort" class="inp"><option value="value">Price: high → low</option><option value="value_asc">Price: low → high</option><option value="brand">Brand</option><option value="year">Year (newest)</option><option value="name">Name</option></select>
    </div>
    <div id="ivResult"></div>
  </section>`;
  el('ivsrc').value=f.source; el('ivbrand').value=f.brand; el('ivpartner').value=f.partner; el('ivincl').value=f.incl; el('ivsort').value=f.sort;
  const upd=()=>{ f.q=el('ivq').value; f.source=el('ivsrc').value; f.brand=el('ivbrand').value; f.partner=el('ivpartner').value; f.incl=el('ivincl').value; f.minP=el('ivmin').value; f.maxP=el('ivmax').value; f.year=el('ivyear').value; f.sort=el('ivsort').value; renderInvResult(); };
  ['ivq','ivmin','ivmax','ivyear'].forEach(id=>el(id).oninput=upd);
  ['ivsrc','ivbrand','ivpartner','ivincl','ivsort'].forEach(id=>el(id).onchange=upd);
  renderInvResult();
}
function renderInvResult(){
  const box=el('ivResult'); if(!box) return; const f=STATE.inv;
  let items=liveItems();
  if(f.source!=='all') items=items.filter(w=>w.source===f.source);
  if(f.brand!=='all') items=items.filter(w=>w.brand===f.brand);
  if(f.partner!=='all') items=items.filter(w=>(w.partner||'')===f.partner);
  if(f.incl!=='all') items=items.filter(w=>(w.incl||[]).some(x=>new RegExp(f.incl,'i').test(x)));
  const q=f.q.trim().toLowerCase(); if(q) items=items.filter(w=>((w.name||'')+' '+(w.ref||'')+' '+(w.brand||'')).toLowerCase().includes(q));
  const mn=parseInt(String(f.minP).replace(/[^0-9]/g,''),10); const mx=parseInt(String(f.maxP).replace(/[^0-9]/g,''),10);
  if(!isNaN(mn)) items=items.filter(w=>(w.price||0)>=mn);
  if(!isNaN(mx)) items=items.filter(w=>(w.price||0)<=mx);
  if(f.year.trim()) items=items.filter(w=>String(w.year||'').includes(f.year.trim()));
  const v=w=>(w.price==null?-1:w.price);
  items=items.slice();
  if(f.sort==='value') items.sort((a,b)=>v(b)-v(a));
  else if(f.sort==='value_asc') items.sort((a,b)=>v(a)-v(b));
  else if(f.sort==='brand') items.sort((a,b)=>(a.brand||'').localeCompare(b.brand||'')||v(b)-v(a));
  else if(f.sort==='year') items.sort((a,b)=>String(b.year||'').localeCompare(String(a.year||'')));
  else if(f.sort==='name') items.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const rows=items.slice(0,600).map(w=>{
    const code=w.partner||'';
    const priceCell=w.status?`<span class="muted">${esc(w.status)}</span>`:full(w.price);
    return `<tr>
      <td>${w.img?`<img class="thumb" src="${esc(w.img)}" loading="lazy" alt="">`:'<div class="thumb"></div>'}</td>
      <td class="title-cell">${w.url?`<a href="${esc(w.url)}" target="_blank" rel="noopener">${esc(w.name)}</a>`:`<div>${esc(w.name)}</div>`}</td>
      <td>${esc(w.brand||'—')}</td>
      <td class="muted">${esc(w.ref||'—')}</td>
      <td class="muted">${esc(String(w.year||'—'))}</td>
      <td>${w.source==='Gentry'?'<span class="badge">Gentry</span>':'<span class="badge" style="background:#E7E0F3;color:#4C1D95">1TP</span>'}</td>
      <td>${code?`<span class="pcode" style="background:${partnerColor(code)}">P${esc(code)}</span>`:'<span class="muted">—</span>'}</td>
      <td>${(w.incl||[]).map(c=>`<span class="badge" style="background:#F1EADD;color:#6b5318">${esc(c)}</span>`).join(' ')||'<span class="muted">—</span>'}</td>
      <td class="num">${priceCell}</td>
    </tr>`;
  }).join('');
  box.innerHTML=`
    <div class="muted" style="font-size:12.5px;margin-bottom:8px">${items.length.toLocaleString()} listing${items.length===1?'':'s'}${items.length>600?' · showing first 600':''}</div>
    <div class="table-wrap" style="max-height:640px;overflow:auto"><table style="min-width:960px">
      <thead><tr><th></th><th>Watch</th><th>Brand</th><th>Ref</th><th>Year</th><th>Source</th><th>Partner</th><th>Inclusions</th><th>Price</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="9" class="empty">No listings match these filters.</td></tr>'}</tbody>
    </table></div>`;
}

/* ─────────────── TAB 7 · Reports / Archive ─────────────── */
function renderReports(){
  const d=STATE.data, ag=d?d.agg:null;
  const failed=(d&&d.failed)||[];
  const auto=STATE.archive.filter(r=>r.auto).length;
  const sales=soldRecords().slice().sort((a,b)=>(a.date<b.date?1:-1));
  const ageMin=d&&d.ageMs?Math.round(d.ageMs/60000):0;
  el('view').innerHTML=`
  <section>
    <h2>Reports / Archive</h2>
    <p class="sub">Admin &amp; backup — add deals by hand, snapshot today's market, export/import the book, and review data quality. Your archive is saved in this browser (localStorage) and the seed file.</p>
    <div class="cards">
      <div class="card"><div class="label">Archive entries</div><div class="value">${STATE.archive.length.toLocaleString()}</div><div class="delta">${auto} auto-detected</div></div>
      <div class="card"><div class="label">Sales logged</div><div class="value">${sales.length}</div><div class="delta">Sold records</div></div>
      <div class="card"><div class="label">Live data source</div><div class="value" style="font-size:18px">${d?(d.server?'Server snapshot':'Live fetch'):'—'}</div><div class="delta">${d?('updated '+d.generatedAt):'—'}${ageMin?` · ${ageMin}m old`:''}</div></div>
      <div class="card"><div class="label">Data quality</div><div class="value" style="font-size:18px">${failed.length?failed.length+' tab(s) failed':'All sources OK'}</div><div class="delta">${ag?ag.gentry.count+' Gentry · '+ag.onetime.count+' 1TP':'—'}</div></div>
    </div>
    ${failed.length?`<div class="note" style="margin-top:14px">⚠ 1TimePiece tabs that failed to load this refresh (values may be undercounted until next run): ${failed.map(esc).join(', ')}</div>`:''}
  </section>

  <section>
    <div class="toolbar">
      <button class="btn gold" id="rAdd">+ Add entry</button>
      <button class="btn ghost" id="rLog">Log today's market</button>
      <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
        <input id="rq" class="inp" style="width:180px" placeholder="Filter archive…" value="${esc(STATE.archiveQ)}">
        <button class="btn ghost" id="rExpJSON">Export JSON</button>
        <button class="btn ghost" id="rExpCSV">Export CSV</button>
        <label class="btn ghost" style="cursor:pointer">Import<input type="file" id="rImp" accept="application/json" style="display:none"></label>
      </div>
    </div>
    <div id="rForm"></div>
    <div id="rArchive"></div>
  </section>

  <section>
    <h3 style="margin-top:0">Sales detail <span class="muted" style="font-weight:400;font-size:13px">(${sales.length})</span></h3>
    <div class="table-wrap" style="max-height:460px;overflow:auto"><table>
      <thead><tr><th>Date</th><th>Watch</th><th>Brand</th><th>Ref</th><th>Source</th><th>Price</th><th>Cost</th><th>Profit</th></tr></thead>
      <tbody>${sales.length?sales.slice(0,400).map(r=>{ const cost=(r.cost!=null&&r.cost!=='')?(+r.cost||0):null; const profit=cost!=null?(r.price||0)-cost:null; return `<tr><td class="muted">${r.date||'—'}${r.auto?' <span class="badge auto">AUTO</span>':''}</td><td class="title-cell"><div>${esc(r.model||'watch')}</div></td><td>${esc(r.brand||'—')}</td><td class="muted">${esc(r.ref||'—')}</td><td class="muted">${esc(sourceOfSale(r))}</td><td class="num">${full(r.price)}</td><td class="num muted">${cost!=null?full(cost):'—'}</td><td class="num ${profit==null?'':(profit>=0?'pos':'neg')}">${profit!=null?full(profit):'—'}</td></tr>`; }).join(''):'<tr><td colspan="8" class="empty">No sales recorded yet.</td></tr>'}</tbody>
    </table></div>
  </section>

  <p class="footnote">Deleting an entry only affects your browser's copy of the archive; the committed /data files (snapshot, sales ledger, history) are never modified from here. Export first if unsure.</p>`;

  el('rAdd').onclick=()=>{ STATE.showForm=!STATE.showForm; renderForm(); };
  el('rLog').onclick=logMarket;
  el('rExpJSON').onclick=exportJSON;
  el('rExpCSV').onclick=exportCSV;
  el('rImp').onchange=importJSON;
  const rq=el('rq'); rq.oninput=()=>{ STATE.archiveQ=rq.value; renderArchiveTable(); };
  renderForm(); renderArchiveTable();
}
function renderForm(){
  const box=el('rForm'); if(!box) return;
  if(!STATE.showForm){ box.innerHTML=''; return; }
  const f=STATE.form;
  const fld=(k,label,ph,type)=>`<label style="font-size:11px;color:var(--muted)">${label}<input data-f="${k}" type="${type||'text'}" value="${esc(String(f[k]))}" placeholder="${ph||''}" class="inp" style="display:block;width:100%;margin-top:4px"></label>`;
  box.innerHTML=`<div class="card" style="margin-bottom:18px">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px">
      <label style="font-size:11px;color:var(--muted)">Kind<select data-f="kind" class="inp" style="display:block;width:100%;margin-top:4px">
        <option value="Bought">Bought (we paid)</option><option value="Sold">Sold (we sold)</option><option value="Offer">Offer received</option><option value="Asking">Asking / comp</option></select></label>
      ${fld('brand','Brand','Rolex')}${fld('model','Model','GMT-Master II Batman')}${fld('ref','Reference','126710BLNR')}
      ${fld('year','Year','2023')}${fld('cond','Condition','Mint / full set')}${fld('price','Price ₱','1010000')}
      ${fld('date','Date','','date')}${fld('cost','Cost ₱ (we paid)','for profit on sales')}${fld('source','Source / partner','Walk-in, Partner 3…')}
      ${fld('incl','Inclusions','Box, Papers, Manuals')}
      <label style="font-size:11px;color:var(--muted);grid-column:1/-1">Notes<input data-f="notes" value="${esc(f.notes)}" placeholder="anything worth remembering" class="inp" style="display:block;width:100%;margin-top:4px"></label>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn" id="rSave">Save to archive</button>
      <button class="btn ghost" id="rCancel">Cancel</button>
    </div>
  </div>`;
  box.querySelector('[data-f="kind"]').value=f.kind;
  box.querySelectorAll('[data-f]').forEach(inp=>{ const ev=inp.tagName==='SELECT'?'onchange':'oninput'; inp[ev]=()=>{ STATE.form[inp.dataset.f]=inp.value; }; });
  el('rSave').onclick=saveRecord; el('rCancel').onclick=()=>{ STATE.showForm=false; renderForm(); };
}
function renderArchiveTable(){
  const box=el('rArchive'); if(!box) return;
  const q=STATE.archiveQ.trim().toLowerCase();
  let rows=STATE.archive;
  if(q) rows=rows.filter(r=>((r.brand||'')+' '+(r.model||'')+' '+(r.ref||'')+' '+(r.source||'')+' '+(r.kind||'')).toLowerCase().includes(q));
  const tagCls=k=>{ if(k==='Sold') return 'badge sold'; if(k==='Bought') return 'badge bought'; if(k==='Offer') return 'badge offer'; return 'badge'; };
  box.innerHTML=`
    <div class="muted" style="font-size:12px;margin-bottom:8px">${STATE.archive.length} entries${q?' · '+rows.length+' shown':''} · saved in this browser</div>
    <div class="table-wrap" style="max-height:520px;overflow:auto"><table style="min-width:820px">
      <thead><tr><th>Date</th><th>Kind</th><th>Watch</th><th>Ref</th><th>Source</th><th>Inclusions</th><th>Price</th><th></th></tr></thead>
      <tbody>${rows.length?rows.slice(0,600).map(r=>`<tr>
        <td class="muted">${esc(r.date||'—')}</td>
        <td><span class="${tagCls(r.kind)}">${esc(r.kind||'—')}</span></td>
        <td class="title-cell"><div>${esc(((r.brand||'')+' '+(r.model||'')).trim()||'—')}</div></td>
        <td class="muted">${esc(r.ref||'—')}</td>
        <td class="muted">${esc(r.source||'—')}</td>
        <td>${(Array.isArray(r.incl)?r.incl:(r.incl?[r.incl]:[])).map(c=>`<span class="badge" style="background:#F1EADD;color:#6b5318">${esc(c)}</span>`).join(' ')}</td>
        <td class="num">${full(r.price)}</td>
        <td style="text-align:center"><button data-del="${esc(r.id||'')}" title="Delete entry" style="background:none;border:none;color:#C4BCB0;font-size:15px;cursor:pointer">×</button></td>
      </tr>`).join(''):'<tr><td colspan="8" class="empty">No entries yet. Add a deal, or “Log today’s market” to seed the book with current comps.</td></tr>'}</tbody>
    </table></div>`;
  box.querySelectorAll('[data-del]').forEach(b=> b.onclick=()=>deleteRecord(b.dataset.del));
}

/* ─────────────── archive actions (schema + behavior preserved) ─────────────── */
function saveRecord(){
  const f=STATE.form;
  if(!f.model && !f.ref && !f.brand) return;
  const rec={
    id:'r'+Date.now()+Math.random().toString(36).slice(2,6),
    kind:f.kind, brand:f.brand.trim(), model:f.model.trim(), ref:f.ref.trim(), year:f.year.trim(), cond:f.cond.trim(),
    price:f.price?parseInt(String(f.price).replace(/[^0-9]/g,''),10):null,
    cost:f.cost?parseInt(String(f.cost).replace(/[^0-9]/g,''),10):null,
    incl:f.incl?f.incl.split(/[,/]+/).map(x=>x.trim()).filter(Boolean):[],
    date:f.date, source:f.source.trim(), notes:f.notes.trim(),
  };
  STATE.archive=[rec, ...STATE.archive]; persistArchive(STATE.archive);
  STATE.form=blankForm(); STATE.showForm=false; render();
}
function deleteRecord(id){
  const r=STATE.archive.find(x=>x.id===id);
  const label=r?(((r.brand||'')+' '+(r.model||'')).trim()||r.kind||'this entry'):'this entry';
  if(!confirm('Delete "'+label+'" from your browser archive?\n\nThis only removes it from this browser — committed /data files are untouched. Export first if unsure.')) return;
  STATE.archive=STATE.archive.filter(x=>x.id!==id); persistArchive(STATE.archive); renderArchiveTable();
}
function logMarket(){
  const d=STATE.data; if(!d) return;
  const day=todayStr();
  const existing=new Set(STATE.archive.map(r=>r.id));
  const mk=(w,src)=>({ id:'m'+day+'|'+src+'|'+normRef(w.ref||w.name)+'|'+(w.price||0),
    kind:'Asking', brand:w.brand||'', model:w.name||'', ref:w.ref||'', year:w.year||'', cond:w.cond||'',
    price:w.price||null, cost:null, incl:w.incl||[], date:day, source:src+(w.partner?' · Partner '+w.partner:''), notes:'auto market snapshot' });
  const fresh=[];
  (d.gentry||[]).forEach(w=>{ if(w.price) fresh.push(mk(w,'Gentry')); });
  (d.onetime||[]).forEach(w=>{ if(w.price) fresh.push(mk(w,'1TimePiece')); });
  const dedup=fresh.filter(r=>!existing.has(r.id));
  STATE.archive=[...dedup, ...STATE.archive]; persistArchive(STATE.archive);
  render();
}
function download(name,text,type){ const blob=new Blob([text],{type}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),2000); }
function exportJSON(){ download('price-archive.json', JSON.stringify(STATE.archive,null,2), 'application/json'); }
function exportCSV(){
  const cols=['date','kind','brand','model','ref','year','cond','incl','price','cost','source','notes'];
  const esc2=v=>'"'+String(v==null?'':(Array.isArray(v)?v.join(' / '):v)).replace(/"/g,'""')+'"';
  const rows=[cols.join(',')].concat(STATE.archive.map(r=>cols.map(c=>esc2(r[c])).join(',')));
  download('price-archive.csv', rows.join('\n'), 'text/csv');
}
function importJSON(e){
  const file=e.target.files&&e.target.files[0]; if(!file) return;
  const fr=new FileReader();
  fr.onload=()=>{ try{ const arr=JSON.parse(fr.result); if(Array.isArray(arr)){ const byId={}; [...arr,...STATE.archive].forEach(r=>{ if(r&&r.id) byId[r.id]=r; }); STATE.archive=Object.values(byId); persistArchive(STATE.archive); render(); } }catch(err){ alert('Could not read that file.'); } };
  fr.readAsText(file);
}

/* ─────────────── boot ─────────────── */
(async ()=>{
  STATE.archive = await loadArchive();
  render();
  await refresh(false);
})();
</script>
</body>
</html>
